sync:
  version: '1.1'
  default_mode: incremental   # incremental | full | dry_run

  schedule:
    daily_cron: '0 0 * * *'  # 09:00 KST (00:00 UTC)
    timezone: Asia/Seoul

  retry:
    max_attempts: 3
    backoff_seconds: [2, 5, 15]
    on_anchor_miss: replace_content

# ── 동기화 대상 페이지 ──────────────────────────────────────
pages:

  # ── 기존 코어 ──
  - id: '35255ed436f0810f830be1feb1512c28'
    label: 'C33-library'
    enabled: true
    tags: [library, session, kg]
    sections: [banner, kg_table, session, actions]

  - id: '35155ed436f081fbb2f1c01d0b85a1b8'
    label: 'session-hub'
    enabled: true
    tags: [session, hub]
    sections: [banner, session]

  # ── Financial Terminal Platform ──
  - id: '36e55ed436f081d1ae3fc3690fb60e86'
    label: 'financial-terminal-hub'
