# ── 전역 섹션 정책 ──────────────────────────────────────────
section_policy:
  replace_content:
    - banner
    - kg_table
    - ew_table
    - session
    - actions
  update_content:
    - sop
    - links

# ── 오류 예측 임계값 ────────────────────────────────────────
error_predictor:
  block_on: [CRITICAL, HIGH]
  warn_on:  [MEDIUM]
  danger_patterns:
    - escape_mismatch:   CRITICAL
    - table_row:         HIGH
    - callout_blockquote: HIGH
    - bold_inline:       MEDIUM
    - inline_code:       MEDIUM
    - link:              MEDIUM
